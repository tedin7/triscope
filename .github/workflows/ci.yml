name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci || npm install
      - run: npm run typecheck --workspaces --if-present
      - run: npm test --workspaces --if-present
      - run: npm run build --workspaces --if-present

  smoke:
    name: ocean-galleon end-to-end
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci || npm install
      - run: npm run build --workspace=@triscope/core
      - name: install chromium + xvfb
        # xvfb is required because WebGPU in true headless Chrome on Linux is
        # unreliable (driver lost, empty surface). Headed Chrome + a virtual
        # display gives a deterministic GPU path.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium-browser xvfb \
            libnss3 libatk-bridge2.0-0 libgbm1 libasound2t64 libxkbcommon0 libdrm2 || \
          sudo apt-get install -y --no-install-recommends \
            chromium xvfb \
            libnss3 libatk-bridge2.0-0 libgbm1 libasound2t64 libxkbcommon0 libdrm2
      - name: smoke ocean-galleon
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: |
          if [ ! -x "$CHROME_BIN" ]; then export CHROME_BIN=/usr/bin/chromium; fi
          xvfb-run --server-args="-screen 0 1600x900x24" \
            node examples/ocean-galleon/smoke.mjs
      - name: upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: /tmp/triscope-ocean-galleon-smoke/
          if-no-files-found: ignore
